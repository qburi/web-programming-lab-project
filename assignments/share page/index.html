<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Share Page</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="index.css">
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

<div class="card shadow-sm share-card w-100 mx-3">
  <div class="card-body p-4 text-center">
    <h5 class="fw-bold mb-3">Share my project!</h5>

    <div class="d-flex justify-content-center gap-3 mb-4">
      <a href="#" onclick="shareTo('whatsapp')" class="social-btn btn-whatsapp text-decoration-none shadow-sm">
        <i class="bi bi-whatsapp"></i>
      </a>
      <a href="#" onclick="shareTo('twitter')" class="social-btn btn-twitter text-decoration-none shadow-sm">
        <i class="bi bi-twitter"></i>
      </a>
      <a href="#" onclick="shareTo('linkedin')" class="social-btn btn-linkedin text-decoration-none shadow-sm">
        <i class="bi bi-linkedin"></i>
      </a>
    </div>

    <button class="btn btn-dark w-100 mb-3 rounded-pill" onclick="nativeShare()">
      <i class="bi bi-share me-2"></i> Share via...
    </button>

    <div class="input-group mt-2">
      <input type="text" class="form-control bg-light" id="websiteUrl" value="https://have to change this.com" readonly>
      <button class="btn btn-outline-secondary" type="button" id="copyBtn" onclick="copyLink()">
        Copy
      </button>
    </div>
  </div>
</div>

<script src="index.js"></script>
</body>
</html>
